<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — ServiceDesk Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Inter, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .offline-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            max-width: 420px;
            backdrop-filter: blur(10px);
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
        }
        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.75rem; color: #fff; }
        p { color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 1.5rem; }
        .btn-retry {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-retry:hover { opacity: 0.85; }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #ff6584;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.8); }
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <span class="offline-icon">📡</span>
        <h1>You're Offline</h1>
        <p>
            <span class="status-dot"></span>No internet connection detected.<br>
            Some features may be unavailable. Cached pages are still accessible.
        </p>
        <button class="btn-retry" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
